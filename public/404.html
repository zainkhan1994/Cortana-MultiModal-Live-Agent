<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA fallback for GitHub Pages: redirect 404s back to the app root.
      // Encodes path + query as a search parameter so the app can restore it.
      var basePathSegments = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + basePathSegments).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(basePathSegments).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
